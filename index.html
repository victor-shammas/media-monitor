<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Right-Wing Media Monitor</title>
        <!-- marked.js for Markdown rendering (Analysis tab) -->
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <style>
            :root {
                --bg: #f5f5f4;
                --ink: #1c1917;
                --mute: #78716c;
                --line: #e7e5e4;
            }
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                background: var(--bg);
                color: var(--ink);
                font:
                    15px/1.45 -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
                padding: 0;
            }
            .wrap {
                max-width: 1200px;
                margin: 0 auto;
                padding: 16px;
            }
            header {
                display: flex;
                justify-content: space-between;
                align-items: flex-end;
                flex-wrap: wrap;
                gap: 12px;
                margin-bottom: 16px;
            }
            h1 {
                margin: 0;
                font-size: 22px;
            }
            .sub {
                color: var(--mute);
                font-size: 13px;
                margin-top: 2px;
            }
            /* Tab Navigation — pill buttons */
            .tabs {
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
                margin-bottom: 16px;
            }
            .tab-button {
                font: inherit;
                cursor: pointer;
                border-radius: 8px;
                border: 1px solid var(--line);
                background: #fff;
                padding: 6px 12px;
                font-size: 13px;
                font-weight: 600;
                letter-spacing: 0.3px;
                color: #57534e;
                transition: all 0.15s ease;
            }
            .tab-button:hover {
                background: #f5f5f4;
                border-color: #d6d3d1;
            }
            .tab-button.active {
                background: var(--ink);
                color: #fff;
                border-color: var(--ink);
            }
            /* Content area */
            .content {
                background: #fff;
                border: 2px solid var(--line);
                border-radius: 12px;
                padding: 16px;
                max-height: 75vh;
                overflow-y: auto;
            }
            /* Article items — thin separator style */
            .article-card {
                border-top: 1px solid rgba(0, 0, 0, 0.08);
                padding-top: 10px;
                margin-top: 10px;
            }
            .article-card:first-child {
                border-top: 0;
                padding-top: 0;
                margin-top: 0;
            }
            .article-card h3 {
                margin: 0;
                font-size: 14px;
                font-weight: 600;
                line-height: 1.3;
            }
            .article-card h3 a {
                color: var(--ink);
                text-decoration: none;
            }
            .article-card h3 a:hover {
                text-decoration: underline;
            }
            .article-card h3 a::after {
                content: " \2197";
                font-size: 12px;
                color: var(--mute);
            }
            .article-meta {
                font-size: 12px;
                color: var(--mute);
                margin-top: 2px;
            }
            .article-summary {
                font-size: 12.5px;
                color: #44403c;
                margin: 4px 0 0 0;
                line-height: 1.35;
            }
            .loading {
                color: var(--mute);
                font-style: italic;
                display: block;
                text-align: center;
                padding: 20px;
            }
            .error {
                color: #b91c1c;
                background: #fef2f2;
                padding: 8px;
                border-radius: 6px;
                font-size: 12px;
                display: block;
                text-align: center;
            }
            .no-results {
                color: var(--mute);
                font-style: italic;
                font-size: 13px;
                text-align: center;
                padding: 40px 0;
            }
            /* Wrapper that locks content width to the tab row */
            .feed-wrap {
                display: inline-flex;
                flex-direction: column;
                align-items: stretch;
            }
            /* Footer */
            .foot {
                text-align: center;
                color: var(--mute);
                font-size: 12px;
                margin-top: 20px;
            }
            .foot a {
                color: var(--ink);
            }
            .foot a#analysis-link {
                color: var(--mute);
                text-decoration: none;
                margin-left: 2px;
            }
            .foot a#analysis-link:hover {
                color: var(--ink);
                text-decoration: underline;
            }

            /* ── Analysis tab styles ── */

            /* Password form */
            .pw-form {
                text-align: center;
                padding: 40px 20px;
            }
            .pw-form p {
                color: var(--mute);
                font-size: 13px;
                margin: 0 0 12px 0;
            }
            .pw-form input {
                font: inherit;
                font-size: 14px;
                padding: 8px 12px;
                border: 1px solid var(--line);
                border-radius: 8px;
                outline: none;
                width: 220px;
                transition: border-color 0.15s;
            }
            .pw-form input:focus {
                border-color: var(--ink);
            }
            .pw-form button {
                font: inherit;
                font-size: 13px;
                font-weight: 600;
                padding: 8px 16px;
                margin-left: 6px;
                border: none;
                border-radius: 8px;
                background: var(--ink);
                color: #fff;
                cursor: pointer;
                transition: opacity 0.15s;
            }
            .pw-form button:hover {
                opacity: 0.85;
            }
            .pw-error {
                color: #b91c1c;
                font-size: 12px;
                margin-top: 8px;
            }

            /* Report list */
            .report-list {
                list-style: none;
                padding: 0;
                margin: 0;
            }
            .report-list li {
                border-top: 1px solid rgba(0, 0, 0, 0.08);
                padding: 10px 0;
            }
            .report-list li:first-child {
                border-top: 0;
                padding-top: 0;
            }
            .report-list a {
                color: var(--ink);
                text-decoration: none;
                font-size: 14px;
                font-weight: 600;
                display: block;
                line-height: 1.3;
                cursor: pointer;
            }
            .report-list a:hover {
                text-decoration: underline;
            }
            .report-list .report-date {
                font-size: 12px;
                color: var(--mute);
                margin-top: 2px;
            }

            /* Back button */
            .back-btn {
                font: inherit;
                font-size: 13px;
                font-weight: 600;
                color: var(--mute);
                background: none;
                border: 1px solid var(--line);
                border-radius: 8px;
                padding: 5px 12px;
                cursor: pointer;
                margin-bottom: 12px;
                transition: all 0.15s;
            }
            .back-btn:hover {
                background: #f5f5f4;
                border-color: #d6d3d1;
                color: var(--ink);
            }

            /* Rendered markdown */
            .md-body {
                font-size: 14px;
                line-height: 1.6;
                color: var(--ink);
            }
            .md-body h1 {
                font-size: 20px;
                margin: 0 0 8px 0;
                padding-bottom: 6px;
                border-bottom: 2px solid var(--line);
            }
            .md-body h2 {
                font-size: 17px;
                margin: 20px 0 6px 0;
                padding-bottom: 4px;
                border-bottom: 1px solid var(--line);
            }
            .md-body h3 {
                font-size: 15px;
                margin: 16px 0 4px 0;
            }
            .md-body p {
                margin: 8px 0;
            }
            .md-body ul,
            .md-body ol {
                padding-left: 24px;
                margin: 8px 0;
            }
            .md-body li {
                margin: 4px 0;
            }
            .md-body blockquote {
                margin: 12px 0;
                padding: 8px 16px;
                border-left: 3px solid var(--ink);
                background: var(--bg);
                border-radius: 0 8px 8px 0;
                color: #44403c;
            }
            .md-body pre {
                background: #292524;
                color: #e7e5e4;
                padding: 12px 16px;
                border-radius: 8px;
                overflow-x: auto;
                font-size: 13px;
                line-height: 1.4;
            }
            .md-body code {
                font-family: "SF Mono", "Fira Code", Menlo, monospace;
                font-size: 13px;
            }
            .md-body :not(pre) > code {
                background: var(--bg);
                padding: 2px 5px;
                border-radius: 4px;
            }
            .md-body table {
                border-collapse: collapse;
                width: 100%;
                margin: 12px 0;
                font-size: 13px;
            }
            .md-body th,
            .md-body td {
                border: 1px solid var(--line);
                padding: 6px 10px;
                text-align: left;
            }
            .md-body th {
                background: var(--bg);
                font-weight: 600;
            }
            .md-body hr {
                border: none;
                border-top: 1px solid var(--line);
                margin: 16px 0;
            }
            .md-body a {
                color: #2563eb;
                text-decoration: none;
            }
            .md-body a:hover {
                text-decoration: underline;
            }
            .md-body strong {
                font-weight: 700;
            }
        </style>
    </head>
    <body>
        <div class="wrap">
            <header>
                <div>
                    <h1>Transatlantic Right-Wing Media Monitor</h1>
                </div>
            </header>
            <div class="feed-wrap">
                <div class="tabs" id="tab-container"></div>
                <div class="content" id="feed-content">
                    <span class="loading">Select a category to load the feed...</span>
                </div>
            </div>
            <p class="foot">
                All links are automatically aggregated via Google News RSS. Errors and
                irrelevant results may occur.
                <a href="#analysis" id="analysis-link">Analysis</a>
            </p>
        </div>

        <script>
            /* ── Configuration ── */

            // SHA-256 hash of the password. To change the password, run in browser console:
            //   crypto.subtle.digest('SHA-256', new TextEncoder().encode('YOUR_PASSWORD'))
            //     .then(h => console.log(Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2,'0')).join('')))
            // Then paste the resulting hash below.
            const ANALYSIS_PW_HASH =
                "72d293a6c33c566f6ca07e3523ec1e78ade66feae25cbb9137d4977c09c539e1"; // "password"

            const REPORTS_API_URL =
                "https://api.github.com/repos/victor-shammas/media-monitor/contents/reports";

            /* ── Feed tabs ── */

            const feeds = [
                { filename: "usa", name: "\u{1F1FA}\u{1F1F8} USA" },
                { filename: "norway", name: "\u{1F1F3}\u{1F1F4} Norway" },
                { filename: "sweden", name: "\u{1F1F8}\u{1F1EA} Sweden" },
                { filename: "france", name: "\u{1F1EB}\u{1F1F7} France" },
                { filename: "italy", name: "\u{1F1EE}\u{1F1F9} Italy" },
                { filename: "uk", name: "\u{1F1EC}\u{1F1E7} UK" },
                { filename: "germany", name: "\u{1F1E9}\u{1F1EA} Germany" },
                { filename: "hungary", name: "\u{1F1ED}\u{1F1FA} Hungary" },
                { filename: "poland", name: "\u{1F1F5}\u{1F1F1} Poland" },
                { filename: "spain", name: "\u{1F1EA}\u{1F1F8} Spain" },
                { filename: "general", name: "\u{1F30D} General" },
                { filename: "networks", name: "\u{1F578}\u{FE0F} Networks" },
            ];

            const tabContainer = document.getElementById("tab-container");
            const feedContent = document.getElementById("feed-content");

            const hash = window.location.hash.substring(1);
            let initialFeedLoaded = false;

            // Create feed tabs
            feeds.forEach((feed) => {
                const btn = document.createElement("button");
                btn.className = "tab-button";
                btn.textContent = feed.name;
                btn.dataset.feed = feed.filename;
                btn.onclick = () => {
                    loadFeed(feed.filename, btn);
                    window.history.pushState(null, null, `#${feed.filename}`);
                };
                tabContainer.appendChild(btn);
                if (hash === feed.filename) {
                    loadFeed(feed.filename, btn);
                    initialFeedLoaded = true;
                }
            });

            // Handle #analysis deep link
            if (hash === "analysis") {
                showAnalysisTab();
                initialFeedLoaded = true;
            }

            if (!initialFeedLoaded && feeds.length > 0) {
                const firstBtn = tabContainer.firstChild;
                loadFeed(feeds[0].filename, firstBtn);
            }

            /* ── Utility ── */

            function setActiveTab(activeBtn) {
                document
                    .querySelectorAll(".tab-button")
                    .forEach((b) => b.classList.remove("active"));
                activeBtn.classList.add("active");
            }

            async function sha256(message) {
                const msgBuffer = new TextEncoder().encode(message);
                const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
                return Array.from(new Uint8Array(hashBuffer))
                    .map((b) => b.toString(16).padStart(2, "0"))
                    .join("");
            }

            const MONTH_NAMES = [
                "January",
                "February",
                "March",
                "April",
                "May",
                "June",
                "July",
                "August",
                "September",
                "October",
                "November",
                "December",
            ];

            function formatReportName(filename) {
                // Strip .md extension
                const base = filename.replace(/\.md$/i, "");
                // Try to match pattern: YYYY-MM-DD-HHMM-rest or YYYY_MM_DD_HHMM_rest
                const m = base.match(
                    /^(\d{4})[-_ ](\d{2})[-_ ](\d{2})[-_ ](\d{2})(\d{2})[-_ ](.+)$/,
                );
                if (m) {
                    const month = MONTH_NAMES[parseInt(m[2], 10) - 1] || m[2];
                    const day = parseInt(m[3], 10);
                    const year = m[1];
                    const hours = m[4];
                    const minutes = m[5];
                    const rest = m[6]
                        .replace(/[-_]/g, " ")
                        .replace(/\b\w/g, (c) => c.toUpperCase());
                    return `${month} ${day}, ${year} (${hours}:${minutes}) \u2013 ${rest}`;
                }
                // Fallback: just clean up
                return base.replace(/[-_]/g, " ").replace(/\b\w/g, (c) => c.toUpperCase());
            }

            /* ── Analysis tab ── */

            // Wire up the footer link
            document.getElementById("analysis-link").addEventListener("click", (e) => {
                e.preventDefault();
                window.history.pushState(null, null, "#analysis");
                showAnalysisTab();
            });

            function showAnalysisTab() {
                // Deselect any active feed tab
                document
                    .querySelectorAll(".tab-button")
                    .forEach((b) => b.classList.remove("active"));
                // Check if already authenticated this session
                if (sessionStorage.getItem("analysis_auth") === "1") {
                    loadReportList();
                    return;
                }
                // Show password prompt
                feedContent.innerHTML = `
        <div class="pw-form">
          <p>This section is password-protected.</p>
          <div>
            <input type="password" id="pw-input" placeholder="Enter password" autocomplete="off" />
            <button id="pw-submit">Unlock</button>
          </div>
          <div class="pw-error" id="pw-error" style="display:none;"></div>
        </div>
      `;
                const pwInput = document.getElementById("pw-input");
                const pwSubmit = document.getElementById("pw-submit");
                const pwError = document.getElementById("pw-error");

                async function tryAuth() {
                    const val = pwInput.value;
                    if (!val) return;
                    const hashed = await sha256(val);
                    if (hashed === ANALYSIS_PW_HASH) {
                        sessionStorage.setItem("analysis_auth", "1");
                        loadReportList();
                    } else {
                        pwError.textContent = "Incorrect password.";
                        pwError.style.display = "block";
                        pwInput.value = "";
                        pwInput.focus();
                    }
                }

                pwSubmit.addEventListener("click", tryAuth);
                pwInput.addEventListener("keydown", (e) => {
                    if (e.key === "Enter") tryAuth();
                });
                pwInput.focus();
            }

            async function loadReportList() {
                feedContent.innerHTML = `<span class="loading">Loading reports...</span>`;
                try {
                    const res = await fetch(REPORTS_API_URL);
                    if (!res.ok) throw new Error("Could not load reports folder.");
                    const files = await res.json();

                    // Filter: only .md files, exclude filenames containing "input" (case-insensitive)
                    const reports = files
                        .filter(
                            (f) =>
                                f.name.endsWith(".md") &&
                                !f.name.toLowerCase().includes("input"),
                        )
                        .sort((a, b) => a.name.localeCompare(b.name));

                    if (reports.length === 0) {
                        feedContent.innerHTML = `<div class="no-results">No reports found.</div>`;
                        return;
                    }

                    let html = `<ul class="report-list">`;
                    reports.forEach((r) => {
                        // Derive a display name with formatted date/time if present
                        const displayName = formatReportName(r.name);
                        html += `
            <li>
              <a onclick="loadReport('${r.download_url}', '${displayName.replace(/'/g, "\\'")}')">${displayName}</a>
            </li>`;
                    });
                    html += `</ul>`;
                    feedContent.innerHTML = html;
                    feedContent.scrollTop = 0;
                } catch (err) {
                    feedContent.innerHTML = `<span class="error">\u26A0 ${err.message}</span>`;
                }
            }

            async function loadReport(rawUrl, title) {
                feedContent.innerHTML = `<span class="loading">Loading report...</span>`;
                try {
                    const res = await fetch(rawUrl);
                    if (!res.ok) throw new Error("Could not fetch report.");
                    const md = await res.text();
                    const rendered = marked.parse(md);
                    feedContent.innerHTML = `
          <button class="back-btn" onclick="loadReportList()">\u2190 Back to reports</button>
          <div class="md-body">${rendered}</div>
        `;
                    feedContent.scrollTop = 0;
                } catch (err) {
                    feedContent.innerHTML = `<span class="error">\u26A0 ${err.message}</span>`;
                }
            }

            /* ── Feed loading (existing logic) ── */

            function parseTextToHTML(rawText) {
                const parts = rawText.split(/\u2550{10,}/);
                if (parts.length < 3)
                    return `<div class="no-results">No recent articles found in this category.</div>`;

                const bodyText = parts.slice(2).join("\u2550").trim();
                if (!bodyText || bodyText.includes("(no results)")) {
                    return `<div class="no-results">No recent articles found in this category.</div>`;
                }

                const articleBlocks = bodyText.split(/\n\s*\n/);
                let htmlOutput = "";

                articleBlocks.forEach((block) => {
                    const lines = block
                        .trim()
                        .split("\n")
                        .map((line) => line.trim());
                    if (lines.length < 3) return;

                    let title = lines[0].replace(/^\d+\.\s*/, "");
                    let url = "";
                    let lastLine = lines[lines.length - 1];
                    if (lastLine.startsWith("http")) {
                        url = lastLine;
                        lines.pop();
                    }

                    let published = "";
                    let summary = "";
                    for (let i = 1; i < lines.length; i++) {
                        if (lines[i].startsWith("Published:")) {
                            published = lines[i];
                        } else if (lines[i].startsWith("Added:")) {
                            continue;
                        } else {
                            let lineText = lines[i];
                            if (lineText !== title && lineText !== "") {
                                summary += lineText + " ";
                            }
                        }
                    }

                    htmlOutput += `
          <div class="article-card">
            <h3><a href="${url || "#"}" target="_blank" rel="noopener noreferrer">${title}</a></h3>
            <div class="article-meta">
              ${published ? `${published.replace("Published:", "").trim()}` : ""}
            </div>
            ${summary ? `<p class="article-summary">${summary.trim()}</p>` : ""}
          </div>
        `;
                });

                return htmlOutput;
            }

            function loadFeed(filename, clickedBtn) {
                setActiveTab(clickedBtn);
                feedContent.innerHTML = `<span class="loading">Fetching newest data for ${filename}...</span>`;
                fetch(`feeds/${filename}.txt`)
                    .then((response) => {
                        if (!response.ok)
                            throw new Error(
                                "File not found. Has the script run for this category yet?",
                            );
                        return response.text();
                    })
                    .then((text) => {
                        feedContent.innerHTML = parseTextToHTML(text);
                        feedContent.scrollTop = 0;
                    })
                    .catch((error) => {
                        feedContent.innerHTML = `<span class="error">\u26A0 ${error.message}</span>`;
                    });
            }
        </script>
    </body>
</html>
