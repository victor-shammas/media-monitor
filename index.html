<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Right-Wing Media Monitor</title>
        <style>
            :root {
                --bg: #f5f5f4;
                --ink: #1c1917;
                --mute: #78716c;
                --line: #e7e5e4;
            }
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                background: var(--bg);
                color: var(--ink);
                font:
                    15px/1.45 -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
                padding: 0;
            }
            .wrap {
                max-width: 1200px;
                margin: 0 auto;
                padding: 16px;
            }
            header {
                display: flex;
                justify-content: space-between;
                align-items: flex-end;
                flex-wrap: wrap;
                gap: 12px;
                margin-bottom: 16px;
            }
            h1 {
                margin: 0;
                font-size: 22px;
            }
            .sub {
                color: var(--mute);
                font-size: 13px;
                margin-top: 2px;
            }

            /* Tab Navigation — pill buttons matching rightwing.html */
            .tabs {
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
                margin-bottom: 16px;
            }
            .tab-button {
                font: inherit;
                cursor: pointer;
                border-radius: 8px;
                border: 1px solid var(--line);
                background: #fff;
                padding: 6px 12px;
                font-size: 13px;
                font-weight: 600;
                letter-spacing: 0.3px;
                color: #57534e;
                transition: all 0.15s ease;
            }
            .tab-button:hover {
                background: #f5f5f4;
                border-color: #d6d3d1;
            }
            .tab-button.active {
                background: var(--ink);
                color: #fff;
                border-color: var(--ink);
            }

            /* Content area */
            .content {
                background: #fff;
                border: 2px solid var(--line);
                border-radius: 12px;
                padding: 16px;
                max-height: 75vh;
                overflow-y: auto;
            }

            /* Article items — thin separator style from rightwing.html */
            .article-card {
                border-top: 1px solid rgba(0, 0, 0, 0.08);
                padding-top: 10px;
                margin-top: 10px;
            }
            .article-card:first-child {
                border-top: 0;
                padding-top: 0;
                margin-top: 0;
            }
            .article-card h3 {
                margin: 0;
                font-size: 14px;
                font-weight: 600;
                line-height: 1.3;
            }
            .article-card h3 a {
                color: var(--ink);
                text-decoration: none;
            }
            .article-card h3 a:hover {
                text-decoration: underline;
            }
            .article-card h3 a::after {
                content: " \2197";
                font-size: 12px;
                color: var(--mute);
            }
            .article-meta {
                font-size: 12px;
                color: var(--mute);
                margin-top: 2px;
            }
            .article-summary {
                font-size: 12.5px;
                color: #44403c;
                margin: 4px 0 0 0;
                line-height: 1.35;
            }

            .loading {
                color: var(--mute);
                font-style: italic;
                display: block;
                text-align: center;
                padding: 20px;
            }
            .error {
                color: #b91c1c;
                background: #fef2f2;
                padding: 8px;
                border-radius: 6px;
                font-size: 12px;
                display: block;
                text-align: center;
            }
            .no-results {
                color: var(--mute);
                font-style: italic;
                font-size: 13px;
                text-align: center;
                padding: 40px 0;
            }

            /* Wrapper that locks content width to the tab row */
            .feed-wrap {
                display: inline-flex;
                flex-direction: column;
                align-items: stretch;
            }

            /* Footer */
            .foot {
                text-align: center;
                color: var(--mute);
                font-size: 12px;
                margin-top: 20px;
            }
            .foot a {
                color: var(--ink);
            }
        </style>
    </head>
    <body>
        <div class="wrap">
            <header>
                <div>
                    <h1>Transatlantic Right-Wing Media Monitor</h1>
                </div>
            </header>

            <div class="feed-wrap">
                <div class="tabs" id="tab-container"></div>

                <div class="content" id="feed-content">
                    <span class="loading">Select a category to load the feed...</span>
                </div>
            </div>
        </div>

        <script>
            const feeds = [
                { filename: "usa", name: "\u{1F1FA}\u{1F1F8} USA" },
                { filename: "norway", name: "\u{1F1F3}\u{1F1F4} Norway" },
                { filename: "sweden", name: "\u{1F1F8}\u{1F1EA} Sweden" },
                { filename: "france", name: "\u{1F1EB}\u{1F1F7} France" },
                { filename: "italy", name: "\u{1F1EE}\u{1F1F9} Italy" },
                { filename: "uk", name: "\u{1F1EC}\u{1F1E7} UK" },
                { filename: "germany", name: "\u{1F1E9}\u{1F1EA} Germany" },
                { filename: "hungary", name: "\u{1F1ED}\u{1F1FA} Hungary" },
                { filename: "general", name: "\u{1F30D} General" },
                { filename: "networks", name: "\u{1F578}\u{FE0F} Networks" },
            ];

            const tabContainer = document.getElementById("tab-container");
            const feedContent = document.getElementById("feed-content");

            // Read the word after the '#' in the URL (e.g., #hungary -> hungary)
            const hash = window.location.hash.substring(1);
            let initialFeedLoaded = false;

            feeds.forEach((feed, index) => {
                const btn = document.createElement("button");
                btn.className = "tab-button";
                btn.textContent = feed.name;

                btn.onclick = () => {
                    loadFeed(feed.filename, btn);
                    window.history.pushState(null, null, `#${feed.filename}`);
                };
                tabContainer.appendChild(btn);

                if (hash === feed.filename) {
                    loadFeed(feed.filename, btn);
                    initialFeedLoaded = true;
                }
            });

            if (!initialFeedLoaded && feeds.length > 0) {
                const firstBtn = tabContainer.firstChild;
                loadFeed(feeds[0].filename, firstBtn);
            }

            function parseTextToHTML(rawText) {
                const parts = rawText.split(/\u2550{10,}/);

                if (parts.length < 3)
                    return `<div class="no-results">No recent articles found in this category.</div>`;

                const bodyText = parts.slice(2).join("\u2550").trim();
                if (!bodyText || bodyText.includes("(no results)")) {
                    return `<div class="no-results">No recent articles found in this category.</div>`;
                }

                const articleBlocks = bodyText.split(/\n\s*\n/);
                let htmlOutput = "";

                articleBlocks.forEach((block) => {
                    const lines = block
                        .trim()
                        .split("\n")
                        .map((line) => line.trim());
                    if (lines.length < 3) return;

                    let title = lines[0].replace(/^\d+\.\s*/, "");

                    let url = "";
                    let lastLine = lines[lines.length - 1];
                    if (lastLine.startsWith("http")) {
                        url = lastLine;
                        lines.pop();
                    }

                    let published = "";
                    let summary = "";

                    for (let i = 1; i < lines.length; i++) {
                        if (lines[i].startsWith("Published:")) {
                            published = lines[i];
                        } else if (lines[i].startsWith("Added:")) {
                            continue;
                        } else {
                            let lineText = lines[i];
                            if (lineText !== title && lineText !== "") {
                                summary += lineText + " ";
                            }
                        }
                    }

                    htmlOutput += `
            <div class="article-card">
                <h3><a href="${url || "#"}" target="_blank" rel="noopener noreferrer">${title}</a></h3>
                <div class="article-meta">
                    ${published ? `${published.replace("Published:", "").trim()}` : ""}
                </div>
                ${summary ? `<p class="article-summary">${summary.trim()}</p>` : ""}
            </div>
            `;
                });

                return htmlOutput;
            }

            function loadFeed(filename, clickedBtn) {
                document
                    .querySelectorAll(".tab-button")
                    .forEach((btn) => btn.classList.remove("active"));
                if (clickedBtn) clickedBtn.classList.add("active");

                feedContent.innerHTML = `<span class="loading">Fetching newest data for ${filename}...</span>`;

                fetch(`feeds/${filename}.txt`)
                    .then((response) => {
                        if (!response.ok)
                            throw new Error(
                                "File not found. Has the script run for this category yet?",
                            );
                        return response.text();
                    })
                    .then((text) => {
                        feedContent.innerHTML = parseTextToHTML(text);
                        feedContent.scrollTop = 0;
                    })
                    .catch((error) => {
                        feedContent.innerHTML = `<span class="error">\u26A0 ${error.message}</span>`;
                    });
            }
        </script>
    </body>
</html>
