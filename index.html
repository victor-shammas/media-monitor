<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Right-Wing Media Monitor</title>
        <!-- marked.js for Markdown rendering (Analysis tab) -->
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css" />
        <style>
            :root {
                --bg: #f5f5f4;
                --ink: #1c1917;
                --mute: #78716c;
                --line: #e7e5e4;
            }
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                background: var(--bg);
                color: var(--ink);
                font:
                    15px/1.45 -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
                padding: 0;
            }
            .wrap {
                max-width: 1200px;
                margin: 0 auto;
                padding: 16px;
            }
            header {
                display: flex;
                justify-content: space-between;
                align-items: flex-end;
                flex-wrap: wrap;
                gap: 12px;
                margin-bottom: 16px;
            }
            h1 {
                margin: 0;
                font-size: 22px;
            }
            .sub {
                color: var(--mute);
                font-size: 13px;
                margin-top: 2px;
            }
            /* Tab Navigation — pill buttons */
            .tabs {
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
                margin-bottom: 16px;
            }
            .tab-button {
                font: inherit;
                cursor: pointer;
                border-radius: 8px;
                border: 1px solid var(--line);
                background: #fff;
                padding: 6px 12px;
                font-size: 13px;
                font-weight: 600;
                letter-spacing: 0.3px;
                color: #57534e;
                transition: all 0.15s ease;
                display: inline-flex;
                align-items: center;
                gap: 5px;
            }
            .tab-button .fi {
                width: 16px;
                height: 12px;
                border-radius: 2px;
                flex-shrink: 0;
                line-height: 1;
            }
            .tab-button:hover {
                background: #f5f5f4;
                border-color: #d6d3d1;
            }
            .tab-button.active {
                background: var(--ink);
                color: #fff;
                border-color: var(--ink);
            }
            /* Content area */
            .content {
                background: #fff;
                border: 2px solid var(--line);
                border-radius: 12px;
                padding: 16px;
                max-height: 75vh;
                overflow-y: auto;
            }
            /* Article items — thin separator style */
            .article-card {
                border-top: 1px solid rgba(0, 0, 0, 0.08);
                padding-top: 10px;
                margin-top: 10px;
            }
            .article-card:first-child {
                border-top: 0;
                padding-top: 0;
                margin-top: 0;
            }
            .article-card h3 {
                margin: 0;
                font-size: 14px;
                font-weight: 600;
                line-height: 1.3;
            }
            .article-card h3 a {
                color: var(--ink);
                text-decoration: none;
            }
            .article-card h3 a:hover {
                text-decoration: underline;
            }
            .article-card h3 a::after {
                content: " \2197";
                font-size: 12px;
                color: var(--mute);
            }
            .article-meta {
                font-size: 12px;
                color: var(--mute);
                margin-top: 2px;
            }
            .source-badge {
                display: inline-flex;
                align-items: center;
                gap: 3px;
                font-weight: 600;
                color: var(--ink);
            }
            .source-badge .fi {
                width: 14px;
                height: 10px;
                border-radius: 2px;
                flex-shrink: 0;
            }
            .article-summary {
                font-size: 12.5px;
                color: #44403c;
                margin: 4px 0 0 0;
                line-height: 1.35;
            }
            .loading {
                color: var(--mute);
                font-style: italic;
                display: block;
                text-align: center;
                padding: 20px;
            }
            .error {
                color: #b91c1c;
                background: #fef2f2;
                padding: 8px;
                border-radius: 6px;
                font-size: 12px;
                display: block;
                text-align: center;
            }
            .no-results {
                color: var(--mute);
                font-style: italic;
                font-size: 13px;
                text-align: center;
                padding: 40px 0;
            }
            /* Wrapper that locks content width to the tab row */
            .feed-wrap {
                display: inline-flex;
                flex-direction: column;
                align-items: stretch;
            }
            /* Footer */
            .foot {
                text-align: center;
                color: var(--mute);
                font-size: 12px;
                margin-top: 20px;
            }
            .foot a {
                color: var(--ink);
            }
            .foot a#analysis-link {
                color: var(--mute);
                text-decoration: none;
                margin-left: 2px;
            }
            .foot a#analysis-link:hover {
                color: var(--ink);
                text-decoration: underline;
            }

            /* ── Analysis tab styles ── */

            /* Password form */
            .pw-form {
                text-align: center;
                padding: 40px 20px;
            }
            .pw-form p {
                color: var(--mute);
                font-size: 13px;
                margin: 0 0 12px 0;
            }
            .pw-form input {
                font: inherit;
                font-size: 14px;
                padding: 8px 12px;
                border: 1px solid var(--line);
                border-radius: 8px;
                outline: none;
                width: 220px;
                transition: border-color 0.15s;
            }
            .pw-form input:focus {
                border-color: var(--ink);
            }
            .pw-form button {
                font: inherit;
                font-size: 13px;
                font-weight: 600;
                padding: 8px 16px;
                margin-left: 6px;
                border: none;
                border-radius: 8px;
                background: var(--ink);
                color: #fff;
                cursor: pointer;
                transition: opacity 0.15s;
            }
            .pw-form button:hover {
                opacity: 0.85;
            }
            .pw-error {
                color: #b91c1c;
                font-size: 12px;
                margin-top: 8px;
            }

            /* Report list */
            .report-list {
                list-style: none;
                padding: 0;
                margin: 0;
            }
            .report-list li {
                border-top: 1px solid rgba(0, 0, 0, 0.08);
                padding: 10px 0;
            }
            .report-list li:first-child {
                border-top: 0;
                padding-top: 0;
            }
            .report-list a {
                color: var(--ink);
                text-decoration: none;
                font-size: 14px;
                font-weight: 600;
                display: block;
                line-height: 1.3;
                cursor: pointer;
            }
            .report-list a:hover {
                text-decoration: underline;
            }
            .report-list .report-date {
                font-size: 12px;
                color: var(--mute);
                margin-top: 2px;
            }

            /* Back button */
            .back-btn {
                font: inherit;
                font-size: 13px;
                font-weight: 600;
                color: var(--mute);
                background: none;
                border: 1px solid var(--line);
                border-radius: 8px;
                padding: 5px 12px;
                cursor: pointer;
                margin-bottom: 12px;
                transition: all 0.15s;
            }
            .back-btn:hover {
                background: #f5f5f4;
                border-color: #d6d3d1;
                color: var(--ink);
            }

            /* Rendered markdown */
            .md-body {
                font-size: 14px;
                line-height: 1.6;
                color: var(--ink);
            }
            .md-body h1 {
                font-size: 20px;
                margin: 0 0 8px 0;
                padding-bottom: 6px;
                border-bottom: 2px solid var(--line);
            }
            .md-body h2 {
                font-size: 17px;
                margin: 20px 0 6px 0;
                padding-bottom: 4px;
                border-bottom: 1px solid var(--line);
            }
            .md-body h3 {
                font-size: 15px;
                margin: 16px 0 4px 0;
            }
            .md-body p {
                margin: 8px 0;
            }
            .md-body ul,
            .md-body ol {
                padding-left: 24px;
                margin: 8px 0;
            }
            .md-body li {
                margin: 4px 0;
            }
            .md-body blockquote {
                margin: 12px 0;
                padding: 8px 16px;
                border-left: 3px solid var(--ink);
                background: var(--bg);
                border-radius: 0 8px 8px 0;
                color: #44403c;
            }
            .md-body pre {
                background: #292524;
                color: #e7e5e4;
                padding: 12px 16px;
                border-radius: 8px;
                overflow-x: auto;
                font-size: 13px;
                line-height: 1.4;
            }
            .md-body code {
                font-family: "SF Mono", "Fira Code", Menlo, monospace;
                font-size: 13px;
            }
            .md-body :not(pre) > code {
                background: var(--bg);
                padding: 2px 5px;
                border-radius: 4px;
            }
            .md-body table {
                border-collapse: collapse;
                width: 100%;
                margin: 12px 0;
                font-size: 13px;
            }
            .md-body th,
            .md-body td {
                border: 1px solid var(--line);
                padding: 6px 10px;
                text-align: left;
            }
            .md-body th {
                background: var(--bg);
                font-weight: 600;
            }
            .md-body hr {
                border: none;
                border-top: 1px solid var(--line);
                margin: 16px 0;
            }
            .md-body a {
                color: #2563eb;
                text-decoration: none;
            }
            .md-body a:hover {
                text-decoration: underline;
            }
            .md-body strong {
                font-weight: 700;
            }
            .spin {
                display: inline-block;
                animation: spin 1s linear infinite;
            }
            /* Header search box */
            #search-input {
                font: inherit;
                font-size: 13px;
                padding: 5px 10px;
                border: 1px solid var(--line);
                border-radius: 8px;
                background: #fff;
                color: var(--ink);
                outline: none;
                width: 200px;
                transition: border-color 0.15s;
            }
            #home-link {
                color: inherit;
                text-decoration: none;
            }
            #home-link:hover {
                text-decoration: underline;
            }
            #search-input:focus {
                border-color: var(--ink);
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>
    <body>
        <div class="wrap">
            <header>
                <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
                    <h1><a href="#" id="home-link">Transatlantic Right-Wing Media Monitor</a></h1>
                    <button class="tab-button" id="translate-btn" title="Translate to English" style="display:none;font-size:12px;padding:4px 10px">EN</button>
                    <input type="search" id="search-input" placeholder="Search articles..." autocomplete="off" />
                </div>
            </header>
            <div class="feed-wrap">
                <div class="tabs" id="tab-container"></div>
                <div class="content" id="feed-content">
                    <span class="loading">Select a category to load the feed...</span>
                </div>
            </div>
            <p class="foot">
                All links are automatically aggregated via Google News RSS, and all summaries are AI-generated. Errors and irrelevant results may occur.
                [<a href="#analysis" id="analysis-link">Analysis</a>]
            </p>
        </div>

        <script>
            /* ── Configuration ── */

            // SHA-256 hash of the password. To change the password, run in browser console:
            //   crypto.subtle.digest('SHA-256', new TextEncoder().encode('YOUR_PASSWORD'))
            //     .then(h => console.log(Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2,'0')).join('')))
            // Then paste the resulting hash below.
            const ANALYSIS_PW_HASH =
                "72d293a6c33c566f6ca07e3523ec1e78ade66feae25cbb9137d4977c09c539e1"; // "password"

            const REPORTS_API_URL =
                "https://api.github.com/repos/victor-shammas/media-monitor/contents/reports";

            /* ── Feed tabs ── */

            const feeds = [
                { filename: "usa", name: "USA", flag: "us", lang: "en" },
                { filename: "uk", name: "UK", flag: "gb", lang: "en" },
                { filename: "france", name: "France", flag: "fr", lang: "fr" },
                { filename: "italy", name: "Italy", flag: "it", lang: "it" },
                { filename: "germany", name: "Germany", flag: "de", lang: "de" },
                { filename: "sweden", name: "Sweden", flag: "se", lang: "sv" },
                { filename: "norway", name: "Norway", flag: "no", lang: "no" },
                { filename: "hungary", name: "Hungary", flag: "hu", lang: "hu" },
                { filename: "poland", name: "Poland", flag: "pl", lang: "pl" },
                { filename: "spain", name: "Spain", flag: "es", lang: "es" },
                { filename: "networks", name: "\u{1F578}\u{FE0F} Networks", lang: "en" },
                { filename: "general", name: "\u{1F30D} General", lang: "en" },
            ];

            const tabContainer = document.getElementById("tab-container");
            const feedContent = document.getElementById("feed-content");

            let currentFeed = null;
            let isTranslated = false;

            const hash = window.location.hash.substring(1);
            let initialFeedLoaded = false;

            // Create feed tabs
            feeds.forEach((feed) => {
                const btn = document.createElement("button");
                btn.className = "tab-button";
                if (feed.flag) {
                    const fi = document.createElement("span");
                    fi.className = `fi fi-${feed.flag}`;
                    btn.appendChild(fi);
                    btn.appendChild(document.createTextNode(feed.name));
                } else {
                    btn.textContent = feed.name;
                }
                btn.dataset.feed = feed.filename;
                btn.onclick = () => {
                    loadFeed(feed.filename, btn);
                    window.history.pushState(null, null, `#${feed.filename}`);
                };
                tabContainer.appendChild(btn);
                if (hash === feed.filename) {
                    loadFeed(feed.filename, btn);
                    initialFeedLoaded = true;
                }
            });

            document.getElementById("translate-btn").onclick = () => toggleTranslate();

            document.getElementById("home-link").addEventListener("click", (e) => {
                e.preventDefault();
                searchInput.value = "";
                loadFeed(feeds[0].filename, tabContainer.firstChild);
                window.history.pushState(null, null, `#${feeds[0].filename}`);
            });

            const searchInput = document.getElementById("search-input");
            searchInput.addEventListener("input", applySearchFilter);
            searchInput.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    const q = searchInput.value.trim();
                    if (q) {
                        runCrossSearch(q);
                    } else {
                        const searchBtn = document.getElementById("search-tab-btn");
                        if (searchBtn) {
                            searchBtn.textContent = "🔍 Search";
                            setActiveTab(searchBtn);
                            feedContent.innerHTML = "";
                        }
                    }
                }
            });

            function applySearchFilter() {
                const searchBtn = document.getElementById("search-tab-btn");
                if (searchBtn && searchBtn.classList.contains("active")) return;
                const q = searchInput.value.trim().toLowerCase();
                const cards = feedContent.querySelectorAll(".article-card");
                cards.forEach((card) => {
                    if (!q) {
                        card.style.display = "";
                        return;
                    }
                    const text = card.textContent.toLowerCase();
                    card.style.display = text.includes(q) ? "" : "none";
                });
            }

            // Handle #search= deep link
            if (hash.startsWith("search=")) {
                const q = decodeURIComponent(hash.slice(7));
                if (q) {
                    searchInput.value = q;
                    runCrossSearch(q);
                    initialFeedLoaded = true;
                }
            }

            // Handle #analysis deep link
            if (hash === "analysis") {
                showAnalysisTab();
                initialFeedLoaded = true;
            }

            if (!initialFeedLoaded && feeds.length > 0) {
                const firstBtn = tabContainer.firstChild;
                loadFeed(feeds[0].filename, firstBtn);
            }

            /* ── Utility ── */

            function setActiveTab(activeBtn) {
                document
                    .querySelectorAll(".tab-button:not(#translate-btn)")
                    .forEach((b) => b.classList.remove("active"));
                activeBtn.classList.add("active");
            }

            async function sha256(message) {
                const msgBuffer = new TextEncoder().encode(message);
                const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
                return Array.from(new Uint8Array(hashBuffer))
                    .map((b) => b.toString(16).padStart(2, "0"))
                    .join("");
            }

            const MONTH_NAMES = [
                "January",
                "February",
                "March",
                "April",
                "May",
                "June",
                "July",
                "August",
                "September",
                "October",
                "November",
                "December",
            ];

            function formatReportName(filename) {
                // Strip .md extension
                const base = filename.replace(/\.md$/i, "");
                // Try to match pattern: YYYY-MM-DD-HHMM-rest or YYYY_MM_DD_HHMM_rest
                const m = base.match(
                    /^(\d{4})[-_ ](\d{2})[-_ ](\d{2})[-_ ](\d{2})(\d{2})[-_ ](.+)$/,
                );
                if (m) {
                    const month = MONTH_NAMES[parseInt(m[2], 10) - 1] || m[2];
                    const day = parseInt(m[3], 10);
                    const year = m[1];
                    const hours = m[4];
                    const minutes = m[5];
                    const rest = m[6]
                        .replace(/[-_]/g, " ")
                        .replace(/\b\w/g, (c) => c.toUpperCase());
                    return `${month} ${day}, ${year} (${hours}:${minutes}) \u2013 ${rest}`;
                }
                // Fallback: just clean up
                return base.replace(/[-_]/g, " ").replace(/\b\w/g, (c) => c.toUpperCase());
            }

            /* ── Analysis tab ── */

            // Wire up the footer link
            document.getElementById("analysis-link").addEventListener("click", (e) => {
                e.preventDefault();
                window.history.pushState(null, null, "#analysis");
                showAnalysisTab();
            });

            function showAnalysisTab() {
                // Deselect any active feed tab
                document
                    .querySelectorAll(".tab-button")
                    .forEach((b) => b.classList.remove("active"));
                document.getElementById("translate-btn").style.display = "none";
                // Check if already authenticated this session
                if (sessionStorage.getItem("analysis_auth") === "1") {
                    loadReportList();
                    return;
                }
                // Show password prompt
                feedContent.innerHTML = `
        <div class="pw-form">
          <p>This section is password-protected.</p>
          <div>
            <input type="password" id="pw-input" placeholder="Enter password" autocomplete="off" />
            <button id="pw-submit">Unlock</button>
          </div>
          <div class="pw-error" id="pw-error" style="display:none;"></div>
        </div>
      `;
                const pwInput = document.getElementById("pw-input");
                const pwSubmit = document.getElementById("pw-submit");
                const pwError = document.getElementById("pw-error");

                async function tryAuth() {
                    const val = pwInput.value;
                    if (!val) return;
                    const hashed = await sha256(val);
                    if (hashed === ANALYSIS_PW_HASH) {
                        sessionStorage.setItem("analysis_auth", "1");
                        loadReportList();
                    } else {
                        pwError.textContent = "Incorrect password.";
                        pwError.style.display = "block";
                        pwInput.value = "";
                        pwInput.focus();
                    }
                }

                pwSubmit.addEventListener("click", tryAuth);
                pwInput.addEventListener("keydown", (e) => {
                    if (e.key === "Enter") tryAuth();
                });
                pwInput.focus();
            }

            async function loadReportList() {
                feedContent.innerHTML = `<span class="loading">Loading reports...</span>`;
                try {
                    const res = await fetch(REPORTS_API_URL);
                    if (!res.ok) throw new Error("Could not load reports folder.");
                    const files = await res.json();

                    // Filter: only .md files, exclude filenames containing "input" (case-insensitive)
                    const reports = files
                        .filter(
                            (f) =>
                                f.name.endsWith(".md") &&
                                !f.name.toLowerCase().includes("input"),
                        )
                        .sort((a, b) => a.name.localeCompare(b.name));

                    if (reports.length === 0) {
                        feedContent.innerHTML = `<div class="no-results">No reports found.</div>`;
                        return;
                    }

                    let html = `<ul class="report-list">`;
                    reports.forEach((r) => {
                        // Derive a display name with formatted date/time if present
                        const displayName = formatReportName(r.name);
                        html += `
            <li>
              <a onclick="loadReport('${r.download_url}', '${displayName.replace(/'/g, "\\'")}')">${displayName}</a>
            </li>`;
                    });
                    html += `</ul>`;
                    feedContent.innerHTML = html;
                    feedContent.scrollTop = 0;
                } catch (err) {
                    feedContent.innerHTML = `<span class="error">\u26A0 ${err.message}</span>`;
                }
            }

            async function loadReport(rawUrl, title) {
                feedContent.innerHTML = `<span class="loading">Loading report...</span>`;
                try {
                    const res = await fetch(rawUrl);
                    if (!res.ok) throw new Error("Could not fetch report.");
                    const md = await res.text();
                    const rendered = marked.parse(md);
                    feedContent.innerHTML = `
          <button class="back-btn" onclick="loadReportList()">\u2190 Back to reports</button>
          <div class="md-body">${rendered}</div>
        `;
                    feedContent.scrollTop = 0;
                } catch (err) {
                    feedContent.innerHTML = `<span class="error">\u26A0 ${err.message}</span>`;
                }
            }

            /* ── Feed loading (existing logic) ── */

            function parseTextToHTML(rawText) {
                const parts = rawText.split(/\u2550{10,}/);
                if (parts.length < 3)
                    return `<div class="no-results">No recent articles found in this category.</div>`;

                const bodyText = parts.slice(2).join("\u2550").trim();
                if (!bodyText || bodyText.includes("(no results)")) {
                    return `<div class="no-results">No recent articles found in this category.</div>`;
                }

                const articleBlocks = bodyText.split(/\n\s*\n/);
                let htmlOutput = "";

                articleBlocks.forEach((block) => {
                    const lines = block
                        .trim()
                        .split("\n")
                        .map((line) => line.trim());
                    if (lines.length < 3) return;

                    let title = lines[0].replace(/^\d+\.\s*/, "");
                    let url = "";
                    let lastLine = lines[lines.length - 1];
                    if (lastLine.startsWith("http")) {
                        url = lastLine;
                        lines.pop();
                    }

                    let published = "";
                    let summary = "";
                    for (let i = 1; i < lines.length; i++) {
                        if (lines[i].startsWith("Published:")) {
                            published = lines[i];
                        } else if (lines[i].startsWith("Added:")) {
                            continue;
                        } else {
                            let lineText = lines[i];
                            if (lineText !== title && lineText !== "") {
                                summary += lineText + " ";
                            }
                        }
                    }

                    htmlOutput += `
          <div class="article-card">
            <h3><a href="${url || "#"}" target="_blank" rel="noopener noreferrer">${title}</a></h3>
            <div class="article-meta">
              ${published ? `${published.replace("Published:", "").trim()}` : ""}
            </div>
            ${summary ? `<p class="article-summary">${summary.trim()}</p>` : ""}
          </div>
        `;
                });

                return htmlOutput;
            }

            function parseArticles(rawText) {
                const parts = rawText.split(/═{10,}/);
                if (parts.length < 3) return [];
                const bodyText = parts.slice(2).join("═").trim();
                if (!bodyText || bodyText.includes("(no results)")) return [];

                const articleBlocks = bodyText.split(/\n\s*\n/);
                const articles = [];

                articleBlocks.forEach((block) => {
                    const lines = block.trim().split("\n").map((l) => l.trim());
                    if (lines.length < 3) return;

                    let title = lines[0].replace(/^\d+\.\s*/, "");
                    let url = "";
                    if (lines[lines.length - 1].startsWith("http")) {
                        url = lines.pop();
                    }

                    let published = "";
                    let summary = "";
                    for (let i = 1; i < lines.length; i++) {
                        if (lines[i].startsWith("Published:")) {
                            published = lines[i].replace("Published:", "").trim();
                        } else if (lines[i].startsWith("Added:")) {
                            continue;
                        } else if (lines[i] !== title && lines[i] !== "") {
                            summary += lines[i] + " ";
                        }
                    }

                    articles.push({ title, url, published, summary: summary.trim() });
                });

                return articles;
            }

            /* ── Cross-feed search ── */

            async function runCrossSearch(query) {
                const q = query.toLowerCase();

                let searchBtn = document.getElementById("search-tab-btn");
                if (!searchBtn) {
                    searchBtn = document.createElement("button");
                    searchBtn.className = "tab-button";
                    searchBtn.id = "search-tab-btn";
                    searchBtn.onclick = () => {
                        const currentQ = searchInput.value.trim();
                        if (currentQ) runCrossSearch(currentQ);
                    };
                    tabContainer.appendChild(searchBtn);
                }
                const label = query.length > 20 ? query.slice(0, 20) + "…" : query;
                searchBtn.textContent = `🔍 “${label}”`;

                setActiveTab(searchBtn);
                currentFeed = null;
                document.getElementById("translate-btn").style.display = "none";
                feedContent.innerHTML = `<span class="loading">Searching all feeds…</span>`;
                window.history.pushState(null, null, `#search=${encodeURIComponent(query)}`);

                try {
                    const results = await Promise.all(
                        feeds.map(async (feed) => {
                            try {
                                const res = await fetch(`feeds/${feed.filename}.txt`);
                                if (!res.ok) return [];
                                const text = await res.text();
                                return parseArticles(text).map((a) => ({ ...a, feed }));
                            } catch {
                                return [];
                            }
                        }),
                    );

                    const matched = results.flat().filter(
                        (a) =>
                            a.title.toLowerCase().includes(q) ||
                            a.summary.toLowerCase().includes(q),
                    );

                    if (matched.length === 0) {
                        feedContent.innerHTML = `<div class="no-results">No results found across all feeds.</div>`;
                        return;
                    }

                    let html = "";
                    matched.forEach((a) => {
                        const flagHtml = a.feed.flag
                            ? `<span class="fi fi-${a.feed.flag}"></span>`
                            : "";
                        html += `
              <div class="article-card">
                <h3><a href="${a.url || "#"}" target="_blank" rel="noopener noreferrer">${a.title}</a></h3>
                <div class="article-meta">
                  <span class="source-badge">${flagHtml} ${a.feed.name}</span>${a.published ? ` · ${a.published}` : ""}
                </div>
                ${a.summary ? `<p class="article-summary">${a.summary}</p>` : ""}
              </div>`;
                    });

                    feedContent.innerHTML = html;
                    feedContent.scrollTop = 0;
                } catch (err) {
                    feedContent.innerHTML = `<span class="error">⚠ Search failed: ${err.message}</span>`;
                }
            }

            /* ── Translation ── */

            async function translateText(text, sourceLang) {
                if (!text) return "";
                const url =
                    `https://translate.googleapis.com/translate_a/single?client=gtx` +
                    `&sl=${encodeURIComponent(sourceLang || "auto")}&tl=en&dt=t&q=${encodeURIComponent(text)}`;
                const r = await fetch(url);
                if (!r.ok) throw new Error("translate HTTP " + r.status);
                const j = await r.json();
                if (!Array.isArray(j) || !Array.isArray(j[0]))
                    throw new Error("translate parse");
                return j[0].map((chunk) => (chunk && chunk[0]) || "").join("");
            }

            const TRANSLATE_BATCH = 50;

            async function toggleTranslate() {
                const btn = document.getElementById("translate-btn");
                const cards = Array.from(feedContent.querySelectorAll(".article-card"));
                if (!cards.length || !currentFeed) return;

                const untranslated = cards.filter((c) => !c.dataset.translated);
                const allDone = untranslated.length === 0;

                if (allDone) {
                    cards.forEach((card) => {
                        const titleEl = card.querySelector("h3 a");
                        if (titleEl && titleEl.dataset.original !== undefined)
                            titleEl.textContent = titleEl.dataset.original;
                        delete card.dataset.translated;
                    });
                    isTranslated = false;
                    btn.classList.remove("active");
                    btn.title = "Translate to English";
                    return;
                }

                const batch = untranslated.slice(0, TRANSLATE_BATCH);
                btn.disabled = true;
                btn.innerHTML = '<span class="spin">↻</span>';

                try {
                    await Promise.all(
                        batch.map(async (card) => {
                            const titleEl = card.querySelector("h3 a");
                            const summaryEl = card.querySelector(".article-summary");

                            if (titleEl) {
                                titleEl.dataset.original = titleEl.textContent;
                                try {
                                    titleEl.textContent = await translateText(
                                        titleEl.textContent,
                                        currentFeed.lang,
                                    );
                                } catch {}
                            }
                            card.dataset.translated = "1";
                        }),
                    );
                    isTranslated = true;
                    const remaining = cards.filter((c) => !c.dataset.translated).length;
                    btn.classList.toggle("active", remaining === 0);
                    btn.title = remaining > 0 ? "Translate next batch" : "Show original";
                } catch {}

                btn.disabled = false;
                btn.textContent = "EN";
            }

            /* ── Feed loading ── */

            function loadFeed(filename, clickedBtn) {
                currentFeed = feeds.find((f) => f.filename === filename);
                isTranslated = false;
                const tBtn = document.getElementById("translate-btn");
                tBtn.classList.remove("active");
                tBtn.textContent = "EN";
                tBtn.style.display = currentFeed && currentFeed.lang !== "en" ? "" : "none";

                setActiveTab(clickedBtn);
                feedContent.innerHTML = `<span class="loading">Fetching newest data for ${filename}...</span>`;
                fetch(`feeds/${filename}.txt`)
                    .then((response) => {
                        if (!response.ok)
                            throw new Error(
                                "File not found. Has the script run for this category yet?",
                            );
                        return response.text();
                    })
                    .then((text) => {
                        feedContent.innerHTML = parseTextToHTML(text);
                        feedContent.scrollTop = 0;
                        applySearchFilter();
                    })
                    .catch((error) => {
                        feedContent.innerHTML = `<span class="error">\u26A0 ${error.message}</span>`;
                    });
            }
        </script>
    </body>
</html>
