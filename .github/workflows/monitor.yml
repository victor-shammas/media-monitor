name: Transatlantic Right-Wing Media Monitor

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run the monitor script
        # Explicitly forces the script to output to the "feeds" folder
        run: python media-monitor.py -d feeds

      - name: Commit and push the updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Safely add the entire feeds folder and the state file
          git add feeds/ monitor_state.json
          git commit -m "Automated monitor update" || echo "No changes to commit"
          git pull --rebase
          git push
