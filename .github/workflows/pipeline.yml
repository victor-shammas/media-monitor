name: Media Monitor Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      fetch_only:
        description: "Only fetch RSS, skip enrichment"
        type: boolean
        default: false

concurrency:
  group: media-pipeline
  cancel-in-progress: false

jobs:
  monitor-and-enrich:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout private data repo
        uses: actions/checkout@v4
        with:
          repository: victor-shammas/media-monitor-data
          path: data-private
          token: ${{ secrets.DATA_REPO_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install trafilatura googlenewsdecoder google-genai

      - name: Run unified pipeline
        timeout-minutes: 35
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          if [ "${{ inputs.fetch_only }}" = "true" ]; then
            python media-monitor.py -d feeds --fetch-only
          else
            python media-monitor.py -d feeds --enrich --enrich-hours 24
          fi

      - name: Push enriched data to private repo
        run: |
          cd data-private
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Enriched articles $(date -u +%Y-%m-%d)" || echo "No changes"
          git push

      - name: Commit and push state + feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feeds/ monitor_state.json
          git commit -m "Automated monitor update" || echo "No changes to commit"
          git -c fetch.recurseSubmodules=no pull --rebase
          git push
