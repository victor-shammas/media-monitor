name: Daily AI Intelligence Report

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Runs daily at 06:00 UTC — after the scraper (05:00)
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  email-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install google-genai tenacity markdown

      - name: Run AI Reporter
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        # ──────────────────────────────────────────────────────────
        # TESTING:  use --markdown to write reports/ instead of email
        # PRODUCTION: remove --markdown to send HTML email
        # ──────────────────────────────────────────────────────────
        run: python ai_reporter.py

      - name: Commit reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          git commit -m "Daily intelligence report" || echo "No changes to commit"
          git pull --rebase
          git push
