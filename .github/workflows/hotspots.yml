name: Generate Hotspots

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Every 2 hours, offset 30 minutes from the hourly pipeline so that
    # enrichment from :00 has a chance to land before clustering kicks off.
    - cron: "30 */2 * * *"
  workflow_dispatch:
    inputs:
      hours:
        description: "Lookback window in hours"
        type: string
        default: "48"
      top_n:
        description: "Number of hotspots to return"
        type: string
        default: "5"

concurrency:
  group: media-hotspots
  cancel-in-progress: false

jobs:
  hotspots:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout private data repo
        uses: actions/checkout@v4
        with:
          repository: victor-shammas/media-monitor-data
          path: data-private
          token: ${{ secrets.DATA_REPO_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install google-genai tenacity markdown

      - name: Generate hotspots
        timeout-minutes: 10
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          python hotspots_generator.py \
            --hours "${{ inputs.hours || '48' }}" \
            --top-n "${{ inputs.top_n || '5' }}" \
            --enriched-dir data-private \
            --outdir feeds \
            --private-outdir data-private

      - name: Push canonical artifact to private repo
        run: |
          cd data-private
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hotspots.json
          git commit -m "Hotspots $(date -u +%Y-%m-%dT%H:%M)" || echo "No changes"
          git push

      - name: Commit and push public copy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feeds/hotspots.json
          git commit -m "Update hotspots" || echo "No changes to commit"
          git -c fetch.recurseSubmodules=no pull --rebase
          git push
