name: Article Scraper

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '30 */2 * * *'
  workflow_dispatch:

jobs:
  scrape-articles:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout private data repo
        uses: actions/checkout@v4
        with:
          repository: victor-shammas/media-monitor-data
          path: data-private
          token: ${{ secrets.DATA_REPO_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install trafilatura googlenewsdecoder google-genai

      - name: Run scraper
        timeout-minutes: 30
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: python article_scraper.py --hours 24

      - name: Push enriched data to private repo
        run: |
          cd data-private
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Enriched articles $(date -u +%Y-%m-%d)" || echo "No changes"
          git push
